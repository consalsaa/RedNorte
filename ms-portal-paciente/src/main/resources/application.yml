server:
  port: 8083

spring:
  application:
    name: ms-portal-paciente
  
  datasource:
    url: jdbc:postgresql://postgres-db:5432/portal_paciente_db
    driverClassName: org.postgresql.Driver
    username: postgres
    password: password
  
  jpa:
    database-platform: org.hibernate.dialect.PostgreSQLDialect
    hibernate:
      ddl-auto: update
    show-sql: true

eureka:
  client:
    service-url:
      defaultZone: http://eureka-server:8761/eureka/
