server:
  port: 8081

spring:
  application:
    name: ms-listas-espera
  
  # Configuración de base de datos H2 en memoria
  datasource:
    url: jdbc:h2:mem:listas_espera_db
    driverClassName: org.h2.Driver
    username: sa
    password: password
  
  # Configuración de JPA/Hibernate
  jpa:
    database-platform: org.hibernate.dialect.H2Dialect
    hibernate:
      ddl-auto: update # Útil en desarrollo para auto-crear tablas
    show-sql: true # Imprime las sentencias SQL en consola
  
  # Habilitar consola web de H2
  h2:
    console:
      enabled: true
      path: /h2-console

eureka:
  client:
    service-url:
      defaultZone: http://localhost:8761/eureka/
