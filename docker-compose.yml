version: '3.8'

services:
  eureka-server:
    build: ./eureka-server
    container_name: eureka-server
    ports:
      - "8761:8761"
    networks:
      - rednorte-network

  api-gateway:
    build: ./api-gateway
    container_name: api-gateway
    ports:
      - "8080:8080"
    depends_on:
      - eureka-server
    networks:
      - rednorte-network
    environment:
      - EUREKA_CLIENT_SERVICEURL_DEFAULTZONE=http://eureka-server:8761/eureka/

  ms-listas-espera:
    build: ./ms-listas-espera
    container_name: ms-listas-espera
    ports:
      - "8081:8081"
    depends_on:
      - eureka-server
    networks:
      - rednorte-network
    environment:
      - EUREKA_CLIENT_SERVICEURL_DEFAULTZONE=http://eureka-server:8761/eureka/

  # Módulos pendientes (Comentados temporalmente para evitar que fallen)
  # ms-reasignacion:
  #   build: ./ms-reasignacion
  #   container_name: ms-reasignacion
  #   ports:
  #     - "8082:8082"
