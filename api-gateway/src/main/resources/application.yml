server:
  port: 8080

spring:
  application:
    name: api-gateway
  cloud:
    gateway:
      discovery:
        locator:
          enabled: true
      routes:
        - id: ms-listas-espera
          uri: lb://MS-LISTAS-ESPERA
          predicates:
            - Path=/api/listas-espera/**
        
        - id: ms-portal-paciente
          uri: lb://MS-PORTAL-PACIENTE
          predicates:
            - Path=/api/portal-paciente/**

eureka:
  client:
    service-url:
      defaultZone: http://localhost:8761/eureka/
